name: CI

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
      - release/**

permissions:
  contents: read

jobs:
  checks:
    name: Formatting, Vet, Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [[ -n "${unformatted}" ]]; then
            echo "The following files are not gofmt-formatted:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        env:
          CGO_ENABLED: "1"
        run: go test ./...
